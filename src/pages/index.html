<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Радар технологий</title>
  <link rel="icon" href="/assets/images/icon.png" type="image/png">
  <link rel="shortcut icon" href="/assets/images/icon.png" type="image/png">
  <link rel="stylesheet" href="/src/css/styles.css">
  <link rel="stylesheet" href="/src/css/common.css">
  <link rel="stylesheet" href="/src/css/about.css">
</head>
<body class="dark">
  <!-- ===== Хедер ===== -->
  <header role="banner">
    <a class="logo" href="index.html" aria-label="Радар технологий - на главную">
      <img src="/assets/images/icon.png" alt="Logo" class="logo-img" />
      <span>Радар технологий</span>
    </a>
    <nav class="enterprise-nav" role="tablist" aria-label="Навигация по предприятиям">
      <button role="tab" aria-selected="false" aria-label="Переключить на предприятие РМК">РМК</button>
      <button role="tab" aria-selected="false" aria-label="Переключить на предприятие ТГОК">ТГОК</button>
      <button role="tab" aria-selected="false" aria-label="Переключить на предприятие МГОК">МГОК</button>
      <button role="tab" aria-selected="false" aria-label="Переключить на предприятие КБМ">КБМ</button>
      <button role="tab" aria-selected="false" aria-label="Переключить на предприятие КМЭЗ">КМЭЗ</button>
      <button role="tab" aria-selected="false" aria-label="Переключить на предприятие АМК">АМК</button>
    </nav>
    <div class="controls">
      <button class="help-btn" id="helpBtn" data-tooltip="Помощь" aria-label="Помощь">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <span class="help-btn__text">Помощь</span>
      </button>
      <label class="theme-switch" data-tooltip="Переключить тему" aria-label="Переключить тему">
        <input type="checkbox" id="themeToggle" />
        <span class="slider"></span>
      </label>
      <div id="authInfo"></div>
      <div id="logoutContainer"></div>
    </div>
  </header>

  <!-- ===== Главная ===== -->
<main role="main">
  <div class="main-header">
    <div class="selection-hint">
      <div class="arrow-up">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <polyline points="18,15 12,9 6,15"></polyline>
        </svg>
      </div>
      <div class="selection-text">Чтобы перейти к радару — выберите предприятие</div>
    </div>
    <h1>
      <span>ИНТЕРАКТИВНАЯ ВИЗУАЛИЗАЦИЯ</span><br>
      <span>ЦИФРОВОЙ ЗРЕЛОСТИ</span>
    </h1>

  </div>
  <div id="radarContainer" class="radar-container">
    <svg id="techRadar" viewBox="0 0 1000 1000" role="img" aria-label="Интерактивный радар технологий"></svg>
    <div id="quadrantLabels" role="region" aria-label="Подписи квадрантов"></div>
    <div id="hoverLabel" class="hover-label" role="status" aria-live="polite" aria-atomic="true"></div>
  </div>
</main>
<script src="/src/js/modules/ui/mobile-nav.js"></script>
<script src="/src/js/modules/ui/touch-handlers.js"></script>
<script src="/src/js/audit-logger.js"></script>
<script src="/src/js/script.js"></script>

</body>
</html>
