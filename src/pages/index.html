<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; base-uri 'self';" />
  <meta name="description"
    content="Радар технологий - система управления и визуализации технологических решений для предприятий" />
  <meta name="keywords" content="радар технологий, управление технологиями, визуализация, технологии, предприятия" />
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Радар технологий" />
  <meta property="og:description" content="Система управления и визуализации технологических решений для предприятий" />
  <meta property="og:image" content="/assets/images/icon.png" />
  <!-- Twitter -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Радар технологий" />
  <meta name="twitter:description"
    content="Система управления и визуализации технологических решений для предприятий" />
  <meta name="twitter:image" content="/assets/images/icon.png" />
  <!-- PWA мета-теги -->
  <meta name="theme-color" content="#ce9068" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Радар технологий" />
  <title>Радар технологий</title>
  <link rel="icon" href="/assets/images/icon.png" type="image/png">
  <link rel="shortcut icon" href="/assets/images/icon.png" type="image/png">
  <link rel="stylesheet" href="/src/css/styles.css">
  <link rel="stylesheet" href="/src/css/common.css">
  <link rel="stylesheet" href="/src/css/about.css">
</head>

<body class="dark">
  <!-- ===== Хедер ===== -->
  <header role="banner">
    <a class="logo" href="index.html" aria-label="Радар технологий - на главную">
      <img src="/assets/images/icon.png" alt="Logo" class="logo-img"
        onerror="this.style.display='none'; this.nextElementSibling?.style.display='inline';" />
      <span class="logo-fallback" style="display:none;">РТ</span>
      <span>Радар технологий</span>
    </a>
    <div class="controls">
      <button class="help-btn" id="helpBtn" data-tooltip="Помощь" aria-label="Помощь">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
          focusable="false">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
      </button>
      <button class="notifications-btn" id="notificationsBtn" data-tooltip="Уведомления" aria-label="Уведомления">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
          focusable="false">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <span class="notifications-badge" id="notificationsBadge"></span>
      </button>
      <label class="theme-switch" data-tooltip="Переключить тему" aria-label="Переключить тему">
        <input type="checkbox" id="themeToggle" />
        <span class="slider"></span>
      </label>
      <div id="authInfo"></div>
      <div id="logoutContainer"></div>
    </div>
  </header>

  <!-- ===== Главная ===== -->
  <main role="main">
    <div class="main-header">
      <h1>
        <span>ИНТЕРАКТИВНАЯ ВИЗУАЛИЗАЦИЯ</span><br>
        <span>ЦИФРОВОЙ ЗРЕЛОСТИ</span>
      </h1>
      <p class="hero-subtitle">Исследуйте технологический ландшафт вашего предприятия</p>
      <a href="RMK-director.html" class="radar-link" aria-label="Перейти к детальному просмотру">
        <span>Перейти к детальному просмотру</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </a>
    </div>
    <div id="radarContainer" class="radar-container">
      <svg id="techRadar" viewBox="0 0 1000 1000" role="img" aria-label="Интерактивный радар технологий"></svg>
      <div id="quadrantLabels" role="region" aria-label="Подписи квадрантов"></div>
      <div id="hoverLabel" class="hover-label" role="status" aria-live="polite" aria-atomic="true"></div>
    </div>
  </main>
  <!-- Панель уведомлений -->
  <div id="notificationPanel" class="notification-panel"></div>
  <!-- Утилиты для расчета покрытия функций -->
  <script src="/src/js/modules/utils/func-cover-utils.js"></script>

  <script src="/src/js/modules/ui/common-ui.js"></script>
  <script src="/src/js/modules/ui/notifications.js"></script>
  <script src="/src/js/modules/ui/offline-handler.js"></script>
  <script src="/src/js/modules/ui/mobile-nav.js"></script>
  <script src="/src/js/modules/ui/touch-handlers.js"></script>
  <script src="/src/js/audit-logger.js"></script>
  <script src="/src/js/script.js"></script>

</body>

</html>
