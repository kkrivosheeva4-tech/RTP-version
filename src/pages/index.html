<body class="dark">
  <!-- ===== Хедер ===== -->
  <header role="banner">
    <a class="logo" href="/src/pages/index.html" aria-label="Радар технологий - на главную">
      <img src="/assets/images/icon.png" alt="Logo" class="logo-img"
        onerror="this.style.display='none'; this.nextElementSibling?.style.display='inline';" />
      <span class="logo-fallback" style="display:none;">РТ</span>
      <span>Радар технологий</span>
    </a>
    <div class="controls">
      <button class="help-btn" id="helpBtn" data-tooltip="Помощь" aria-label="Помощь">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
          focusable="false">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
      </button>
      <button class="notifications-btn" id="notificationsBtn" data-tooltip="Уведомления" aria-label="Уведомления">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
          focusable="false">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
        <span class="notifications-badge" id="notificationsBadge"></span>
      </button>
      <label class="theme-switch" data-tooltip="Переключить тему" aria-label="Переключить тему">
        <input type="checkbox" id="themeToggle" />
        <span class="slider"></span>
      </label>
      <div id="authInfo"></div>
      <div id="logoutContainer"></div>
    </div>
  </header>

  <!-- ===== Главная ===== -->
  <main role="main">
    <div class="main-header">
      <h1>
        <span>ИНТЕРАКТИВНАЯ ВИЗУАЛИЗАЦИЯ</span><br>
        <span>ЦИФРОВОЙ ЗРЕЛОСТИ</span>
      </h1>
      <p class="hero-subtitle">Исследуйте технологический ландшафт вашего предприятия</p>
      <a href="/src/pages/radar.html" class="radar-link" id="detailViewLink" aria-label="Перейти к детальному просмотру">
        <span>Перейти к детальному просмотру</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </a>
    </div>
    <div id="radarContainer" class="radar-container">
      <svg id="techRadar" viewBox="0 0 1000 1000" role="img" aria-label="Интерактивный радар технологий"></svg>
    </div>
  </main>
  <!-- Панель уведомлений -->
  <div id="notificationPanel" class="notification-panel"></div>

  <!-- Точка входа: все модули загружаются через main.js (как в radar.html) -->
  <script type="module" src="/src/main.js"></script>
