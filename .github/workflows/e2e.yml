# E2E тесты Playwright (шаг 10.5)
name: E2E Tests

on:
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rtp3
          POSTGRES_USER: rtp3
          POSTGRES_PASSWORD: rtp3
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rtp3 -d rtp3"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PYTHON: python
      SECRET_KEY: ci-e2e-secret
      DEBUG: 'False'
      DB_ENGINE: postgresql
      DB_NAME: rtp3
      DB_USER: rtp3
      DB_PASSWORD: rtp3
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_SSLMODE: disable
      SERVE_FRONTEND_FROM_DJANGO: 'True'
      AUTH_REFRESH_COOKIE_ENABLED: 'True'
      AUTH_RETURN_REFRESH_TOKEN_IN_BODY: 'False'
      AUTH_REFRESH_REQUIRE_CSRF: 'True'
      CORS_ALLOW_CREDENTIALS: 'True'
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:8000
      CSRF_TRUSTED_ORIGINS: http://127.0.0.1:8000
      SECURE_SSL_REDIRECT: 'False'
      SESSION_COOKIE_SECURE: 'False'
      CSRF_COOKIE_SECURE: 'False'
      AUTH_REFRESH_COOKIE_SECURE: 'False'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
