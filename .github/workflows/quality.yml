name: Django CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: django-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  POSTGRES_VERSION: "14"
  SECRET_KEY: ci-secret-key
  DEBUG: "False"
  DB_ENGINE: postgresql
  DB_NAME: rtp3
  DB_USER: rtp3
  DB_PASSWORD: rtp3
  DB_HOST: 127.0.0.1
  DB_PORT: "5432"
  DB_SSLMODE: disable
  AUTH_REFRESH_COOKIE_ENABLED: "True"
  AUTH_RETURN_REFRESH_TOKEN_IN_BODY: "False"
  AUTH_REFRESH_REQUIRE_CSRF: "True"
  CORS_ALLOW_CREDENTIALS: "True"
  CORS_ALLOWED_ORIGINS: https://ci.localhost
  CSRF_TRUSTED_ORIGINS: https://ci.localhost
  SECURE_SSL_REDIRECT: "False"
  SESSION_COOKIE_SECURE: "False"
  CSRF_COOKIE_SECURE: "False"
  AUTH_REFRESH_COOKIE_SECURE: "False"

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff black isort

      - name: Run linters and format checks
        run: |
          python -m ruff check --config backend/pyproject.toml backend
          python -m black --check --config backend/pyproject.toml backend
          python -m isort --check-only --settings-path backend/pyproject.toml backend

  django-tests:
    name: Django Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}-alpine
        env:
          POSTGRES_DB: rtp3
          POSTGRES_USER: rtp3
          POSTGRES_PASSWORD: rtp3
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rtp3 -d rtp3"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Django system checks
        run: |
          python backend/manage.py check
          python backend/manage.py collectstatic --noinput

      - name: Apply migrations
        run: python backend/manage.py migrate --noinput

      - name: Run backend tests
        run: python backend/manage.py test auth_custom references technologies admin_panel config --noinput

  postgres-smoke:
    name: PostgreSQL Smoke
    runs-on: ubuntu-latest
    needs: [quality, django-tests]
    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}-alpine
        env:
          POSTGRES_DB: rtp3
          POSTGRES_USER: rtp3
          POSTGRES_PASSWORD: rtp3
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rtp3 -d rtp3"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Initialize database
        run: |
          python backend/manage.py migrate --noinput
          python backend/manage.py seed_references
          python backend/manage.py seed_technologies
          python backend/manage.py seed_users

      - name: Collect static files
        run: python backend/manage.py collectstatic --noinput

      - name: Run PostgreSQL smoke check
        run: python scripts/postgres-smoke-check.py

      - name: Run load smoke
        run: python scripts/load-smoke.py --iterations 5 --p95-threshold-ms 2000

  build:
    name: Build Container
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rtp3:ci .
