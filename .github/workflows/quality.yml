name: Quality Gate

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies and quality tools
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff black isort

      - name: Run backend quality checks
        run: |
          python -m ruff check --config backend/pyproject.toml backend
          python -m black --check --config backend/pyproject.toml backend
          python -m isort --check-only --settings-path backend/pyproject.toml backend

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend quality checks
        run: npm run quality:frontend

      - name: Build frontend
        run: npm run build

  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rtp3
          POSTGRES_USER: rtp3
          POSTGRES_PASSWORD: rtp3
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rtp3 -d rtp3"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      SECRET_KEY: ci-quality-secret
      DEBUG: 'False'
      DB_ENGINE: postgresql
      DB_NAME: rtp3
      DB_USER: rtp3
      DB_PASSWORD: rtp3
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_SSLMODE: disable
      SERVE_FRONTEND_FROM_DJANGO: 'True'
      AUTH_REFRESH_COOKIE_ENABLED: 'True'
      AUTH_RETURN_REFRESH_TOKEN_IN_BODY: 'False'
      AUTH_REFRESH_REQUIRE_CSRF: 'True'
      CORS_ALLOW_CREDENTIALS: 'True'
      CORS_ALLOWED_ORIGINS: https://ci.localhost
      CSRF_TRUSTED_ORIGINS: https://ci.localhost
      SECURE_SSL_REDIRECT: 'True'
      SESSION_COOKIE_SECURE: 'True'
      CSRF_COOKIE_SECURE: 'True'
      AUTH_REFRESH_COOKIE_SECURE: 'True'
      USE_X_FORWARDED_HOST: 'True'
      USE_X_FORWARDED_PORT: 'True'
      SECURE_PROXY_SSL_HEADER_ENABLED: 'True'
      SECURE_HSTS_SECONDS: '31536000'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Migrate database
        run: python backend/manage.py migrate

      - name: Run backend tests
        run: python backend/manage.py test auth_custom references technologies admin_panel config

  postgres-smoke:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-unit-tests]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rtp3
          POSTGRES_USER: rtp3
          POSTGRES_PASSWORD: rtp3
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rtp3 -d rtp3"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      SECRET_KEY: ci-smoke-secret
      DEBUG: 'False'
      DB_ENGINE: postgresql
      DB_NAME: rtp3
      DB_USER: rtp3
      DB_PASSWORD: rtp3
      DB_HOST: 127.0.0.1
      DB_PORT: '5432'
      DB_SSLMODE: disable
      SERVE_FRONTEND_FROM_DJANGO: 'True'
      AUTH_REFRESH_COOKIE_ENABLED: 'True'
      AUTH_RETURN_REFRESH_TOKEN_IN_BODY: 'False'
      AUTH_REFRESH_REQUIRE_CSRF: 'True'
      CORS_ALLOW_CREDENTIALS: 'True'
      CORS_ALLOWED_ORIGINS: https://ci.localhost
      CSRF_TRUSTED_ORIGINS: https://ci.localhost
      SECURE_SSL_REDIRECT: 'True'
      SESSION_COOKIE_SECURE: 'True'
      CSRF_COOKIE_SECURE: 'True'
      AUTH_REFRESH_COOKIE_SECURE: 'True'
      USE_X_FORWARDED_HOST: 'True'
      USE_X_FORWARDED_PORT: 'True'
      SECURE_PROXY_SSL_HEADER_ENABLED: 'True'
      SECURE_HSTS_SECONDS: '31536000'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Migrate and seed baseline data
        run: |
          python backend/manage.py migrate
          python backend/manage.py seed_references
          python backend/manage.py seed_technologies
          python backend/manage.py seed_users

      - name: Run PostgreSQL smoke
        run: python scripts/postgres-smoke-check.py

      - name: Run load smoke
        run: python scripts/load-smoke.py --iterations 5 --p95-threshold-ms 2000

  frontend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm run test:run

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rtp3:ci .
