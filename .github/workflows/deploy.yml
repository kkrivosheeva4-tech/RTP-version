name: Debian Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: debian-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy To Debian 12
    runs-on: ubuntu-latest
    environment: production
    if: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.DEPLOY_PATH != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all --tags --prune
            git checkout "${{ github.sha }}"
            python3.14 -m venv .venv
            . .venv/bin/activate
            pip install --upgrade pip
            pip install -r backend/requirements.txt
            python backend/manage.py migrate --noinput
            python backend/manage.py collectstatic --noinput
            sudo systemctl restart rtp3-gunicorn
            sudo systemctl reload nginx

      - name: Deployment summary
        run: |
          echo "Deployment completed for commit $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "Target host: ${{ secrets.DEPLOY_HOST }}" >> "$GITHUB_STEP_SUMMARY"
